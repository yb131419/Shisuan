 <!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>彥彬🌿試算系統『購物節』</title>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dom-to-image-more/3.4.4/dom-to-image-more.min.js"></script>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
:root{
  --bg:#0f0f0f;--panel-bg:#1a1a1a;--text:#e0e0e0;--accent:#00d1b2;
  --highlight:#40c4ff;--error:#ff5252;--btn-grey:#3a3a3a;--warning:#ff9800;
  --super:#d4af37;--vip:#00bfa5;--grad-primary:linear-gradient(135deg,#1a2a6c,#b21f1f,#fdbb2d);
  --grad-secondary:linear-gradient(145deg,#2d2d2d,#1f1f1f);--shadow:0 8px 32px rgba(0,0,0,0.4);
  --loader:#00d1b2;--vip-username:linear-gradient(135deg,#00bfa5,#00ffde);
  --super-username:linear-gradient(135deg,#d4af37,#ffff00);--yellow:#ffd700;
  --btn-shadow:0 4px 15px rgba(0,0,0,0.2);--btn-hover-shadow:0 6px 20px rgba(0,0,0,0.3);
  --btn-active-shadow:0 2px 8px rgba(0,0,0,0.2);--btn-transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
  --btn-radius:8px;--btn-padding:8px 14px;
  --period-active:linear-gradient(145deg,#ffffff,#f0f0f0);
  --period-hover:linear-gradient(145deg,#ffffff,#e8e8e8);
  --period-border:#ffffff;--period-shadow:0 0 15px rgba(255,255,255,0.5);
  --period-text:#000;
  --gold:#c9a15a;--gold-light:#ffe9b0;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:var(--bg);color:var(--text);font-family:'Segoe UI','Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif;
  padding:10px;line-height:1.5;min-height:100vh;display:flex;flex-direction:column;align-items:center;
}
#authContainer{
  position:fixed;top:0;left:0;width:100%;height:100vh;display:flex;flex-direction:column;
  align-items:center;z-index:9999;background:rgba(0,0,0,0.88);overflow-y:auto;padding:30px 12px;
  transition:opacity 0.35s ease;
}
#authContainer.fade-out{opacity:0;}
#loginWrapper{display:flex;flex-direction:column;gap:18px;width:100%;max-width:420px;margin:auto;}
.login-loading{padding:20px 0;}
.login-loading .loader.small{width:36px;height:36px;margin:0 auto 14px;}
.login-loading-title{color:var(--highlight);font-weight:600;font-size:1.05rem;margin-bottom:6px;}
.login-loading-desc{color:#999;font-size:0.85rem;line-height:1.6;}
@keyframes fadeInUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.screen-enter{animation:fadeInUp 0.4s ease both;}
@keyframes statusBarIn{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}
.status-in{animation:statusBarIn 0.4s ease;}
@keyframes avatarPulse{0%,100%{box-shadow:0 0 0 4px rgba(0,209,178,0.15),0 6px 20px rgba(0,0,0,0.5);}50%{box-shadow:0 0 0 8px rgba(0,209,178,0.28),0 6px 24px rgba(0,0,0,0.55);}}
.btn-spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.4);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;margin-right:6px;vertical-align:middle;}
.btn-success{background:linear-gradient(145deg,#4caf50,#388e3c)!important;border-color:rgba(129,220,133,0.85)!important;}
@keyframes rowFadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.row-fade-in{animation:rowFadeIn 0.28s ease both;}
@keyframes rowFadeOut{from{opacity:1;}to{opacity:0;}}
#reportTable tbody tr.row-removing td{animation:rowFadeOut 0.2s ease forwards;}
#loginScreen{
  position:relative;width:100%;overflow:hidden;
  background:linear-gradient(160deg,#1c1c1c 0%,#141414 100%);
  border-radius:20px;padding:34px 24px 28px;text-align:center;
  box-shadow:0 0 0 1px rgba(201,161,90,0.25),0 20px 50px rgba(0,0,0,0.55);
  border:1px solid rgba(255,255,255,0.06);
  animation:loginCardIn 0.5s cubic-bezier(0.16,1,0.3,1);
}
#loginScreen::before{
  content:'';position:absolute;top:0;left:0;right:0;height:4px;
  background:linear-gradient(90deg,var(--gold),var(--gold-light),var(--gold));
}
@keyframes loginCardIn{from{opacity:0;transform:translateY(14px) scale(0.98);}to{opacity:1;transform:translateY(0) scale(1);}}
#loginScreen .login-title{
  font-size:1.4rem;font-weight:800;letter-spacing:1px;margin-bottom:20px;
  background:linear-gradient(135deg,#40c4ff,#00d1b2);-webkit-background-clip:text;background-clip:text;color:transparent;
}
.login-avatar-wrap{display:flex;justify-content:center;margin-bottom:14px;}
.login-avatar{
  width:72px;height:72px;border-radius:50%;object-fit:cover;
  border:3px solid var(--gold);box-shadow:0 0 0 4px rgba(0,209,178,0.15),0 6px 20px rgba(0,0,0,0.5);
  animation:avatarPulse 2.6s ease-in-out infinite;
}
.login-avatar-fallback{display:flex;align-items:center;justify-content:center;font-size:2rem;background:#2a2a2a;color:#ccc;}
#loginScreen .login-badge{display:inline-block;padding:4px 14px;border-radius:20px;font-size:13px;font-weight:bold;margin-bottom:10px;}
#loginScreen .login-badge.super{background:rgba(212,175,55,0.15);color:var(--super);border:1px solid rgba(212,175,55,0.4);}
#loginScreen .login-badge.vip{background:rgba(0,191,165,0.15);color:var(--vip);border:1px solid rgba(0,191,165,0.4);}
#loginScreen .login-badge.gold{background:rgba(201,161,90,0.15);color:var(--gold);border:1px solid rgba(201,161,90,0.4);}
#loginScreen .login-badge.normal{background:rgba(64,196,255,0.15);color:var(--highlight);border:1px solid rgba(64,196,255,0.4);}
#loginScreen .login-name{font-size:1.15rem;font-weight:bold;margin-bottom:6px;}
#loginScreen .login-sub{font-size:0.9rem;color:#bbb;margin-bottom:6px;}
.login-rules{
  text-align:left;background:rgba(255,255,255,0.045);border-left:3px solid var(--gold);
  border-radius:10px;padding:14px 14px 14px 16px;margin:18px 0;
}
.login-rules-title{font-size:0.9rem;font-weight:bold;color:var(--gold-light);margin-bottom:9px;letter-spacing:0.5px;}
.login-rules ul{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:8px;}
.login-rules li{font-size:0.8rem;color:#ccc;line-height:1.55;}
.login-rules li b{color:#fff;}
.login-btn-full{width:100%!important;}
#loginScreen .login-exceeded{
  background:linear-gradient(145deg,#4a0000,#2a0000);border:1px solid rgba(255,82,82,0.3);
  color:#fef2f2;padding:14px;border-radius:10px;font-size:0.9rem;line-height:1.7;
}
#loginScreen .super-admin-username{
  background-image:var(--super-username);background-clip:text;-webkit-background-clip:text;color:transparent;
}
#loginScreen .vip-admin-username{
  background-image:var(--vip-username);background-clip:text;-webkit-background-clip:text;color:transparent;
}
#loginExample{
  background:linear-gradient(145deg,#1c1c1c,#141414);border-radius:16px;padding:16px;
  border:1px solid rgba(255,255,255,0.06);box-shadow:var(--shadow);text-align:center;
}
#loginExample .example-title{font-size:0.92rem;color:var(--gold);font-weight:bold;margin-bottom:10px;letter-spacing:1px;}
#loginExample img{width:100%;border-radius:10px;display:block;box-shadow:0 4px 20px rgba(0,0,0,0.5);}
#loginExample .example-caption{font-size:0.75rem;color:#888;margin-top:8px;line-height:1.5;}
/* ============================================================
   驗證區狀態欄 — 一體成型精品質感設計
   ============================================================ */
#authStatusBar{
  position:sticky;top:10px;z-index:999;
  background:
    linear-gradient(165deg, rgba(255,255,255,.05), rgba(255,255,255,0) 40%),
    linear-gradient(150deg,#232323 0%,#161616 100%);
  border-radius:20px;margin-bottom:20px;
  border:1px solid rgba(201,161,90,0.32);
  box-shadow:0 10px 34px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.05);
  display:none;width:100%;max-width:600px;overflow:hidden;
  transition:all 0.3s ease;position:relative;
}
#authStatusBar::before{
  content:'';position:absolute;inset:0;border-radius:20px;padding:1px;pointer-events:none;
  background:linear-gradient(120deg, rgba(201,161,90,0) 0%, rgba(255,233,176,.55) 50%, rgba(201,161,90,0) 100%);
  background-size:220% 100%;
  -webkit-mask:linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor; mask-composite:exclude;
  animation:statusBorderShine 5.5s linear infinite;
}
@keyframes statusBorderShine{0%{background-position:0% 0;}100%{background-position:220% 0;}}
.sb-card{position:relative;z-index:1;padding:16px 18px 15px;}
.sb-top{
  display:flex;align-items:center;justify-content:center;flex-wrap:wrap;
  gap:8px 10px;text-align:center;padding:0 34px;margin-bottom:12px;
}
.sb-badge-ic{font-size:19px;line-height:1;flex:0 0 auto;filter:drop-shadow(0 2px 4px rgba(0,0,0,.4));}
.sb-badge-txt{
  font-size:13.5px;font-weight:800;letter-spacing:.4px;flex:0 0 auto;white-space:nowrap;
}
.sb-user{
  font-size:13.5px;font-weight:800;overflow:hidden;text-overflow:ellipsis;max-width:100%;white-space:nowrap;
  padding-left:10px;margin-left:2px;border-left:1px solid rgba(255,255,255,.16);
}
.sb-user.plain{color:#e6dfcd;font-weight:600;}
.sb-stats{
  display:flex;flex-direction:column;gap:9px;margin-bottom:12px;
}
.sb-stat-row{
  display:flex;align-items:center;gap:10px;font-size:13px;color:#b7b0a1;
  background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.06);
  border-radius:12px;padding:9px 12px;
}
.sb-stat-ic{font-size:15px;flex:0 0 auto;width:20px;text-align:center;}
.sb-stat-label{flex:1;min-width:0;}
.sb-stat-val{font-weight:800;font-size:14px;white-space:nowrap;}
.sb-note{
  font-size:11.5px;color:#8a8477;text-align:center;margin:-2px 0 12px;letter-spacing:.2px;
}
.sb-cta-row{
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  border-top:1px dashed rgba(255,255,255,.1);padding-top:12px;
}
.sb-cta-label{font-size:12.5px;color:#a89b7d;font-weight:700;flex:0 0 auto;}
#authStatusBar .support-btn{
  margin-left:0;flex:0 0 auto;
}
#authStatusBar .close-status {
  position: absolute;
  top: 12px;
  right: 12px;
  width: 30px;
  height: 30px;
  border-radius: 10px;
  background: rgba(255,255,255,.06);
  color: #cfc7b6;
  border: 1px solid rgba(255,255,255,.14);
  cursor: pointer;
  font-size: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  writing-mode: initial;
  text-orientation: initial;
  transition: all 0.25s cubic-bezier(.34,1.56,.64,1);
  padding: 0;
  font-weight: 700;
  line-height: 1;
  margin: 0;
  outline: none;
  z-index: 2;
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
}
#authStatusBar .close-status:hover {
  background: rgba(217,184,115,.16);
  border-color: rgba(217,184,115,.5);
  color: var(--gold-light);
  transform: rotate(90deg);
}
#authStatusBar .close-status:active {
  transform: rotate(90deg) scale(0.9);
}
#authStatusBar .close-status:focus-visible {
  outline: 2px solid var(--gold-light);
  outline-offset: 2px;
}
@keyframes statusCardIn{
  from{opacity:0;transform:translateY(-10px) scale(.98);}
  to{opacity:1;transform:translateY(0) scale(1);}
}
#authStatusBar.status-in{animation:statusCardIn .45s cubic-bezier(.22,.8,.36,1);}
/* ============================================================
   左側滑出式抽屜選單
   ============================================================ */
#menuFabWrap{position:fixed;top:8px;left:8px;z-index:1500;display:none;}
#menuFab{
  width:38px;height:38px;border-radius:11px;cursor:pointer;
  background:linear-gradient(160deg,#232323,#161616);
  color:#fff;border:1px solid rgba(217,184,115,0.35);
  font-size:17px;line-height:1;font-weight:bold;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 3px 12px rgba(0,0,0,0.5);
  -webkit-tap-highlight-color:transparent;transition:all .25s ease;
}
#menuFab:hover{border-color:rgba(0,209,178,0.7);box-shadow:0 4px 16px rgba(0,209,178,0.3);}
#menuFab:active{transform:scale(0.92);}
#menuFab.open{border-color:rgba(0,209,178,0.85);background:linear-gradient(160deg,#2c2c2c,#1c1c1c);}

.drawer-mask{
  position:fixed;inset:0;z-index:1600;background:rgba(0,0,0,0.55);
  backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);
  opacity:0;pointer-events:none;transition:opacity .28s ease;
}
.drawer-mask.on{opacity:1;pointer-events:auto;}

.side-drawer{
  position:fixed;top:0;bottom:0;left:0;width:260px;max-width:80vw;z-index:1700;
  background:linear-gradient(165deg,#1c1c1c 0%,#141414 100%);
  border-right:1px solid rgba(201,161,90,0.3);
  box-shadow:16px 0 48px rgba(0,0,0,0.55);
  transform:translateX(-105%);
  transition:transform .32s cubic-bezier(.34,1.56,.64,1);
  padding:22px 16px;overflow-y:auto;
}
.side-drawer.on{transform:translateX(0);}
.side-drawer::before{
  content:"";position:absolute;top:0;left:0;right:0;height:4px;
  background:linear-gradient(90deg,var(--gold),var(--gold-light),var(--gold));
}
.dr-head{
  font-size:11.5px;letter-spacing:3px;font-weight:800;color:var(--gold-light);
  text-transform:uppercase;margin:2px 6px 16px;display:flex;align-items:center;gap:8px;
}
.dr-head::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,rgba(217,184,115,.4),transparent);}
.dr-item{
  display:flex;align-items:center;gap:12px;width:100%;
  background:transparent;border:1px solid transparent;color:#e0e0e0;
  font-size:14.5px;font-weight:700;text-align:left;
  padding:13px 12px;border-radius:14px;cursor:pointer;margin-bottom:6px;
  -webkit-tap-highlight-color:transparent;transition:all .18s cubic-bezier(.34,1.56,.64,1);
}
.dr-item:hover{background:rgba(0,209,178,0.1);border-color:rgba(0,209,178,0.25);}
.dr-item:active{transform:scale(0.97);background:rgba(0,209,178,0.16);}
.dr-item .ic{
  width:36px;height:36px;border-radius:11px;display:flex;align-items:center;justify-content:center;
  font-size:17px;flex:0 0 auto;background:rgba(0,209,178,0.12);color:var(--accent);
  box-shadow:inset 0 0 0 1px rgba(255,255,255,0.06);
}
.dr-item .ic.gold{background:rgba(217,184,115,0.16);color:var(--gold-light);}
.dr-sep{height:1px;background:rgba(255,255,255,0.08);margin:12px 4px;}
.dr-foot{
  margin-top:6px;padding:12px 12px 2px;font-size:11px;color:#777;line-height:1.6;
  border-top:1px solid rgba(255,255,255,0.06);
}
.loader{
  width:50px;height:50px;border:3px solid rgba(255,255,255,0.1);border-top-color:var(--loader);border-radius:50%;
  animation:spin 1s linear infinite,pulse 2s ease-in-out infinite alternate;margin:0 auto 20px;
}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes pulse{from{box-shadow:0 0 15px rgba(0,209,178,0.3);}to{box-shadow:0 0 25px rgba(0,209,178,0.6);}}
.super-admin{color:var(--super);font-weight:bold;}
.vip-admin{color:var(--vip);font-weight:bold;}
.gold-tier{color:var(--gold);font-weight:bold;}
.normal{color:var(--highlight);font-weight:bold;}
.expired{color:var(--error);font-weight:bold;}
.remaining-days-yellow{color:var(--yellow);font-weight:bold;text-shadow:0 0 5px rgba(255,215,0,0.5);}
.super-admin-username,.vip-admin-username,.gold-username{
  background-clip:text;-webkit-background-clip:text;color:transparent;font-weight:bold;
  text-shadow:0 0 8px rgba(255,255,255,0.3);
}
.super-admin-username{background-image:var(--super-username);}
.vip-admin-username{background-image:var(--vip-username);}
.gold-username{background-image:linear-gradient(135deg,var(--gold),var(--gold-light));}
#captureArea{
   background:#1c1c1c;box-shadow:inset 0 1px 2px rgba(255,255,255,0.05),0 4px 20px rgba(0,0,0,0.6);
  color:var(--text);padding:15px 10px;border-radius:12px;margin-bottom:15px;overflow-x:auto;display:none;width:100%;max-width:600px;
  position: relative;
}
#watermark {
  position: absolute;
  top: 12px;
  right: 15px;
  font-size: 14px;
  color: #ffffff;
  font-weight: 500;
  opacity: 0.9;
  z-index: 10;
  pointer-events: none;
}
#captureArea h2{
  text-align:center;font-size:1.8rem;font-weight:bold;color:#fff;margin:0 0 15px 0;padding:10px 0;
  line-height:1.3;width:100%;
}
.period-options{display:flex;justify-content:center;gap:10px;margin:10px 0 15px;flex-wrap:wrap;align-items:center;}
.period-box{
  border:1px solid #e0e0e0;border-radius:8px;padding:8px 15px;color:#e0e0e0;font-size:14px;cursor:pointer;
  transition:all 0.3s cubic-bezier(0.4,0,0.2,1);position:relative;overflow:hidden;background:transparent;
  font-weight:500;
}
.period-box:hover{
  border-color:var(--period-border);
}
/* hover 白色亮面效果只在真正有滑鼠的裝置生效，避免手機截圖白色殘影 */
@media (hover:hover) and (pointer:fine){
  .period-box:hover{
    border-color:var(--period-border);background:var(--period-hover);color:var(--period-text);
    transform:translateY(-2px);box-shadow:var(--period-shadow);
    background-image:linear-gradient(145deg,#ffffff,#f8f8f8);
  }
}
.period-box.active{
  border-color:var(--period-border);background:var(--period-active);color:var(--period-text);
  font-weight:bold;box-shadow:var(--period-shadow);
  background-image:linear-gradient(145deg,#ffffff,#e8e8e8);
  transform:translateY(-1px);
}
.period-box.active::after{
  content:'';position:absolute;bottom:2px;right:2px;width:12px;height:12px;
  background:var(--period-text);border-radius:50%;opacity:0.8;
}
/* 轉圖片瞬間套用 capture-mode，關閉光暈、位移與所有動畫 */
#captureArea.capture-mode *,
#captureArea.capture-mode *::before,
#captureArea.capture-mode *::after{
  transition:none!important;animation:none!important;
}
#captureArea.capture-mode .period-box,
#captureArea.capture-mode .period-box.active{
  transform:none!important;box-shadow:none!important;
}
#captureArea.capture-mode .period-box.active{
  background:linear-gradient(145deg,#ffffff,#e8e8e8)!important;color:#000!important;
  border-color:#ffffff!important;
}
@media (min-width:768px){
  #captureArea h2{font-size:2.2rem;}
  .period-box{font-size:16px;padding:10px 20px;border-radius:10px;}
}
.userInputs{display:flex;flex-direction:column;gap:10px;margin-bottom:15px;}
.userInputs .row{display:flex;gap:10px;width:100%;}
.userInputs label{flex:1;display:flex;flex-direction:column;font-size:14px;color:#bbb;}
.userInputs label span{text-align:center;margin-bottom:4px;font-size:15px;}
.userInputs input{
  padding:10px;font-size:16px;background:#333;color:var(--text);border:none;
  border-radius:6px;width:100%;text-align:center;
}
.calculator-container{display:flex;gap:5px;}
.btn{
  border:2px solid transparent;border-radius:var(--btn-radius);padding:var(--btn-padding);
  font-size:13px;font-weight:600;color:#fff;cursor:pointer;box-shadow:var(--btn-shadow);
  transition:var(--btn-transition);display:inline-flex;align-items:center;justify-content:center;
  gap:6px;text-decoration:none;-webkit-tap-highlight-color:transparent;position:relative;overflow:hidden;
}
.btn::before{
  content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent);
  transition:all 0.6s ease;
}
.btn:hover::before{left:100%;}
.btn:hover{transform:translateY(-1px);box-shadow:var(--btn-hover-shadow);}
.btn:active{transform:translateY(1px);box-shadow:var(--btn-active-shadow);}
.btn:disabled{opacity:0.7;cursor:not-allowed;transform:none;box-shadow:var(--btn-shadow);}
.btn-primary{
  background:linear-gradient(145deg,#00bfa5,#009e8a);
  border-color:rgba(64,230,205,0.75);
  box-shadow:var(--btn-shadow),0 0 12px rgba(0,209,178,0.25);
}
.btn-primary:hover{background:linear-gradient(145deg,#00ccb2,#00a98e);border-color:rgba(120,245,220,0.95);}
.btn-warning{
  background:linear-gradient(145deg,#ff9800,#e68900);
  border-color:rgba(255,183,77,0.75);
  box-shadow:var(--btn-shadow),0 0 12px rgba(255,152,0,0.25);
}

function calcBonus(totalPv, type) {
  const rates = type === 'manager' ? BONUS_RATES_MANAGER : BONUS_RATES_NON_MANAGER;
  for (const tier of rates) {
    if (totalPv >= tier.minPv) return { rate: tier.rate, label: tier.label };
  }
  return null;
}

function formatNumber(n) {

function updateBonusDisplay() {
  const totalPv    = parseInt(els.totalPvCellDup.textContent)    || 0;
  const totalPrice = parseInt(els.totalPriceCellDup.textContent) || 0;
  const selected   = document.querySelector('input[name="bonusType"]:checked');

  const printBox   = document.getElementById('bonusPrintBox');

    'bonus-toggle-label' + (selected && selected.value === 'non_manager' ? ' active-non-mgr' : '');
  document.getElementById('labelMgr').className =

    printBox.innerHTML = '';

  const result    = calcBonus(totalPv, selected.value);
  const typeLabel = selected.value === 'manager' ? '🏅 經理階' : '👤 非經理';

  if (!result) {
    box.innerHTML = `<div class="bonus-result-label">${typeLabel} · 預計獎金</div><div class="bonus-result-none">PV 未達最低門檻，暫無獎金</div>`;

function getMaxQtyForProduct(productName){
  const val=(productName||'').trim();
  if(val.includes('新入會')||val.includes('新會員')||val.includes('入會'))return 1;
  if(val.includes('限1組'))return 1;
  if(val.includes('限3組'))return 3;
  if(val.includes('限6組'))return 6;
  if(val.includes('限12組'))return 12;
  if(val.includes('2711AB')&&val.includes('(4)'))return 1;
  if(val.includes('777Q')&&val.includes('(4)'))return 2;
  if(val.includes('火山甘露')&&val.includes('限4盒'))return 4;
  if(val.includes('2711AB')&&val.includes('(1)'))return 4;
  return 99;
}

// 現金自動贈品邏輯：每2萬現金 → 贈送 211(30) x1
const GIFT_NAME_KEY = '贈品 211(30)';
function handleCashGift(){
  const basePrice = selectedProds
    .filter(p => !p.name.includes(GIFT_NAME_KEY))
    .reduce((sum, p) => sum + (Number(p.price) || 0) * (Number(p.qty) || 0), 0);
  const targetGiftQty = els.cashOption.checked ? Math.floor(basePrice / 20000) : 0;

  const currentGift = selectedProds.find(p => p.name.includes(GIFT_NAME_KEY));
  const currentGiftQty = currentGift ? (Number(currentGift.qty) || 0) : 0;
  if(targetGiftQty === currentGiftQty) return;

  selectedProds = selectedProds.filter(p => !p.name.includes(GIFT_NAME_KEY));
  if(targetGiftQty > 0){
    const giftProduct = products.find(p => p.name === GIFT_NAME_KEY);
    if(giftProduct){
      selectedProds.push({...giftProduct, qty: targetGiftQty});
    }else{
      showToast(`⚠️ 商品表找不到「${GIFT_NAME_KEY}」，無法自動贈送`, 'error');
    }
  }
  saveSelectedProds();
  renderTable();

  if(els.cashOption.checked){
    if(targetGiftQty > 0){
      showToast(`🎁 現金滿${targetGiftQty*2}萬，自動贈送 211(30) x${targetGiftQty}`);
    }else if(currentGiftQty > 0){
      showToast('現金金額未滿 2 萬，已移除自動贈品', 'warning');
    }
  }
}

// 輔助函數：新增指定品項和數量（使用統一限購規則）
function addSpecificProduct(productName, qty) {
  const product = products.find(p => p.name === productName);
  if (!product) {
    alert(`⚠️ 找不到品項：${productName}`);
    return;
  }

  const exists = selectedProds.find(p => p.name === productName);
  if (exists) {
    const totalQty = exists.qty + qty;
    const maxQty = getMaxQtyForProduct(productName);

    if (productName.includes('新入會') && totalQty > maxQty) {
      return; // 新入會品項重複時直接跳過
    }

    if (totalQty > maxQty) {
      alert(`⚠️ ${productName} 限購${maxQty}個/組，目前已選${exists.qty}個/組，無法再新增`);
      return;
    }

    exists.qty = totalQty;
  } else {
    selectedProds.push({...product, qty});
  }

  saveSelectedProds();
  renderTable();
}

function renderTable(){

      <td style="text-align:center;">${item.name}</td>

const extraDeleteFromBackend=()=>{
  return new Promise((resolve)=>{
    const callbackName=`extraDeleteCallback_${Date.now()}_${Math.random().toString(36).substr(2,6)}`;
    window[callbackName]=function(resp){
      delete window[callbackName];
      resolve(resp);
    };
    const data={action:'extraDelete',userId:userInfo.userId,displayName:userInfo.displayName,callback:callbackName,dataType:'extraDelete'};
    $.ajax({
      url:API_URL,dataType:'jsonp',jsonp:'callback',jsonpCallback:callbackName,
      timeout:JSONP_TIMEOUT,cache:false,data:data,
      error:function(xhr,status,error){
        delete window[callbackName];
        const errorMsg=status==='timeout'?'扣次同步超時，請檢查網絡後重試':`扣次同步失敗：${error||'未知網絡錯誤'}`;
        showToast(errorMsg,'error');
        resolve(null);
      }
    });
  });
};

async function handleDelete(btn){
  if(!authStatus||authStatus.isExpired){
    showToast('賬號已過期，無法操作', 'error');
    return;
  }
  const idx=parseInt(btn.dataset.index);
  if(isNaN(idx)||idx<0||idx>=selectedProds.length)return;

  const isPrivilege=authStatus.isVip||authStatus.isSuperAdmin;

  if(isPrivilege){
    btn.disabled=true;
    await animateRowRemoval(btn);
    selectedProds.splice(idx,1);
    saveSelectedProds();
    renderTable();
    if(els.cashOption.checked) handleCashGift();
    showToast('品項已刪除');
    return;
  }

  const usedDeletes=getSessionDeleteCount();

  // 還在本批免費刪除額度內
  if(usedDeletes<FREE_DELETE_LIMIT){
    btn.disabled=true;
    await animateRowRemoval(btn);
    selectedProds.splice(idx,1);
    saveSelectedProds();
    renderTable();
    if(els.cashOption.checked) handleCashGift();
    setSessionDeleteCount(usedDeletes+1);
    const leftFree=FREE_DELETE_LIMIT-(usedDeletes+1);
    updateAuthStatusBar();
    if(leftFree>0){
      showToast(`品項已刪除（本次還可免費刪除 ${leftFree} 次）`,'warning');
    }else{
      showToast(`品項已刪除，本批 ${FREE_DELETE_LIMIT} 次免費刪除已用完，之後刪除將扣 1 次使用次數換取新的 ${FREE_DELETE_LIMIT} 次刪除機會`,'warning');
    }
    return;
  }

  // 本批免費額度用完 → 扣 1 次使用次數，回復 3 次刪除機會
  if(authStatus.remainingTimes<=0){
    showToast('使用次數已達上限，無法繼續刪除，請升級 💎尊爵用戶','error');
    return;
  }
  const confirmMsg=`您本批的 ${FREE_DELETE_LIMIT} 次免費刪除已用完\n扣除 1 次使用次數即可回復 ${FREE_DELETE_LIMIT} 次刪除機會（目前剩餘 ${authStatus.remainingTimes} 次）\n是否確定扣次並刪除？`;
  if(!confirm(confirmMsg))return;

  btn.disabled=true;
  const originalText=btn.textContent;
  btn.textContent='處理中';
  try{
    const result=await extraDeleteFromBackend();
    if(!result)return;
    if(result.status==='exceeded'){
      showToast(result.message||'使用次數已達上限，無法繼續刪除','error');
      return;
    }
    if(result.status!=='success'){
      showToast(result.message||'扣次失敗，請稍後再試','error');
      return;
    }
    authStatus.remainingTimes=result.remainingTimes;
    sessionStorage.setItem(SESSION_KEY_AUTH,JSON.stringify(authStatus));
    await animateRowRemoval(btn);
    selectedProds.splice(idx,1);
    saveSelectedProds();
    renderTable();
    if(els.cashOption.checked) handleCashGift();

    // 扣 1 次後刪除計數歸零重算，本次刪除計為第 1 次
    setSessionDeleteCount(1);
    updateAuthStatusBar();
    const leftFree=FREE_DELETE_LIMIT-1;
    showToast(`已扣 1 次使用次數，回復 ${FREE_DELETE_LIMIT} 次刪除（本次已用 1 次，尚餘 ${leftFree} 次免費）｜剩餘使用次數 ${authStatus.remainingTimes} 次`,'warning');
  }finally{
    btn.disabled=false;
    btn.textContent=originalText;
  }
}

function addProduct(){
  if(!authStatus||authStatus.isExpired){

  }
  els.addBtn.disabled=true;
  try{

    if(!selectedName||qty<=0){
      alert("請選擇品項與數量");
      return;
    }
    const val=selectedName.trim();
    const maxQty=getMaxQtyForProduct(val);
    if(qty>maxQty){
      if(val.includes('新入會')||val.includes('新會員')||val.includes('入會')){
        alert(`⚠️ 新入會相關品項限購${maxQty}個，已自動調整數量為${maxQty}`);
      }else if(val.includes('限1組')){
        alert(`⚠️ 此品項限1組，已自動調整數量為${maxQty}`);
      }else if(val.includes('限3組')){
        alert(`⚠️ 此品項限3組，已自動調整數量為${maxQty}`);
      }else if(val.includes('限6組')){
        alert(`⚠️ 此品項限6組，已自動調整數量為${maxQty}`);
      }else if(val.includes('限12組')){
        alert(`⚠️ 此品項限12組，已自動調整數量為${maxQty}`);
      }else if(val.includes('2711AB')&&val.includes('(4)')){
        alert(`⚠️ 2711AB(4)限購${maxQty}組，已自動調整數量為${maxQty}`);
      }else if(val.includes('777Q')&&val.includes('(4)')){
        alert(`⚠️ 777Q限購${maxQty}組，已自動調整數量為${maxQty}`);
      }else if(val.includes('火山甘露')&&val.includes('限4盒')){
        alert(`⚠️ 火山甘露限購${maxQty}盒，已自動調整數量為${maxQty}`);
      }else if(val.includes('2711AB')&&val.includes('(1)')){
        alert(`⚠️ 2711AB(1)限購${maxQty}盒，已自動調整數量為${maxQty}`);
      }
      qty=maxQty;
    }
    const product=products.find(p=>p.name===selectedName);
    if(!product){
      alert("找不到該品項");
      return;
    }
    const exists=selectedProds.find(p=>p.name===selectedName);
    if(exists){
      const totalQty=exists.qty+qty;
      if(totalQty>maxQty){
        alert(`⚠️ 該品項限購${maxQty}個/組，目前已選${exists.qty}個/組，無法再新增`);
        return;
      }
      exists.qty+=qty;
    }else{
      selectedProds.push({...product,qty});
    }
    saveSelectedProds();
    renderTable();
    if(els.cashOption.checked) handleCashGift();
    showToast('品項已新增');
  }catch(error){
    showToast(`新增失敗：${error.message}`, 'error');
  }finally{
    els.addBtn.disabled=false;
  }
}

  const originalStyles = {

  const ua=navigator.userAgent||'';
  const isLineInApp=/Line/i.test(ua);
  const isMobile=window.innerWidth<768;
  const MAX_CANVAS_AREA=isLineInApp?6000000:(isMobile?10000000:16000000);
  const MAX_CANVAS_SIDE=isLineInApp?2200:(isMobile?3200:8000);
  const captureHeight=els.captureArea.offsetHeight||1;
  let scale=isLineInApp?1.5:(isMobile?1.5:2);
  const estimatedArea=captureWidth*captureHeight*scale*scale;
  if(estimatedArea>MAX_CANVAS_AREA){
    scale=Math.max(1,Math.floor(Math.sqrt(MAX_CANVAS_AREA/(captureWidth*captureHeight))*10)/10);
  }
  const maxSideScale=Math.min(MAX_CANVAS_SIDE/captureWidth,MAX_CANVAS_SIDE/captureHeight);
  if(scale>maxSideScale){
    scale=Math.max(1,Math.floor(maxSideScale*10)/10);
  }

async function attemptCapture(useScale){
  const dpr=Math.min(window.devicePixelRatio||1,3);
  const captureScale=Math.max(2,useScale*dpr);
  const outputW=Math.round(captureWidth*captureScale);
  const outputH=Math.round(captureHeight*captureScale);

  const capturePromise=domtoimage.toBlob(els.captureArea,{
    width:outputW,
    height:outputH,
    style:{
      transform:`scale(${captureScale})`,
      transformOrigin:'top left',
      width:captureWidth+'px',
      height:captureHeight+'px'
    },
    bgcolor:'#1c1c1c'
  });
  const timeoutPromise=new Promise((_,reject)=>{
    setTimeout(()=>reject(new Error('圖片產生逾時，請重試')),20000);
  });
  return await Promise.race([capturePromise,timeoutPromise]);
}

  try{
    let blob;
    try{
      blob=await attemptCapture(scale);
    }catch(innerErr){
      await new Promise(r=>setTimeout(r,400));
      blob=await attemptCapture(Math.max(1.5,scale-0.5));
    }
    if(!blob)throw new Error('圖片產生失敗');
    if(els.previewImage.dataset.objectUrl){
      URL.revokeObjectURL(els.previewImage.dataset.objectUrl);
    }
    const objectUrl=URL.createObjectURL(blob);
    els.previewImage.src=objectUrl;
    els.previewImage.dataset.objectUrl=objectUrl;
    els.previewImage.style.display="block";
    els.shareToLineBtn.style.display="inline-block";
    els.nativeShareBtn.style.display=navigator.share?"inline-block":"none";
    els.clearImageBtn.style.display="inline-block";
  }catch(error){
    console.error('匯出錯誤:',error);
    showToast(`匯出失敗：${error?.message}`,'error');
  }finally{
    bonusSection.style.display  = '';
    bonusPrintBox.style.display = 'none';
    els.captureArea.classList.remove('capture-mode');
    qtySwaps.forEach(item=>{
      if(item.span.parentNode) item.span.parentNode.removeChild(item.span);
      item.sel.style.display='';
    });

    opCells.forEach(el=>{el.style.display="";});
    els.captureArea.style.width=originalStyles.width;
    els.captureArea.style.paddingLeft=originalStyles.paddingLeft;
    els.captureArea.style.paddingRight=originalStyles.paddingRight;
    els.captureArea.style.position=originalStyles.position;
    els.exportBtn.disabled=false;
    document.querySelectorAll('body > svg, body > div.domtoimage-wrapper').forEach(el=>{
      if(el.parentNode) el.parentNode.removeChild(el);
    });
  }
}

async function shareToLine(){

  if(!els.previewImage.src){alert("請先匯出圖片");return;}
  els.shareToLineBtn.disabled=true;
  try{
    const response=await fetch(els.previewImage.src);
    const blob=await response.blob();
    const base64Data=await new Promise((resolve,reject)=>{
      const reader=new FileReader();
      reader.onloadend=()=>resolve(reader.result.split(",")[1]);
      reader.onerror=()=>reject(new Error('圖片讀取失敗'));
      reader.readAsDataURL(blob);
    });
    const formData=new FormData();
    formData.append("image",base64Data);
    formData.append("key",IMGBB_API_KEY);
    const res=await fetch("https://api.imgbb.com/1/upload",{method:"POST",body:formData,});
    const result=await res.json();
    if(result.success){
      const imageUrl=result.data.url;
      const buyerName=els.buyerInput.value.trim()||"未填";
      const calculatorName=lineName||"未設定";
      const lineShareUrl=`https://line.me/R/msg/text/?${encodeURIComponent(`康園『購物節』試算報表\n\n購買者：${buyerName}\n試算者：${calculatorName}\n${imageUrl}`)}`;
      window.open(lineShareUrl,"_blank");
      showToast("✅ 圖片已上傳");
    }else{
      showToast("圖片上傳失敗，請稍後再試", 'error');
    }
  }catch(error){
    showToast(`圖片上傳錯誤: ${error.message||'未知錯誤'}`, 'error');
  }finally{
    els.shareToLineBtn.disabled=false;
  }
}

// 計算剩餘天數
const calculateRemainingDaysByDate=(expiryDateStr)=>{
  try{
    if(expiryDateStr===PERMANENT_EXPIRY_DATE)return{displayDate:"永久有效",remainingDays:"永久有效",isExpired:false};
    const dateReg=/^\d{4}[-\/]\d{1,2}[-\/]\d{1,2}$/;
    if(!dateReg.test(expiryDateStr))return{displayDate:"格式錯誤",remainingDays:"格式錯誤",isExpired:true};
    const dateParts=expiryDateStr.replace(/-/g,'/').split('/').map(Number);
    const [year,month,day]=dateParts;
    const expiryDate=new Date(year,month-1,day,23,59,59,999);
    const now=new Date();
    if(isNaN(expiryDate.getTime()))return{displayDate:"日期無效",remainingDays:"日期無效",isExpired:true};
    const oneDayMs=1000*3600*24;
    const timeDiff=expiryDate.getTime()-now.getTime();
    let dayDiff=Math.ceil(timeDiff/oneDayMs);
    const fmtMonth=String(month).padStart(2,'0');
    const fmtDay=String(day).padStart(2,'0');
    const displayDate=`${year}/${fmtMonth}/${fmtDay}`;
    let remainingDaysText,isExpired=false;
    if(timeDiff<0){remainingDaysText="<span class='expired'>已過期</span>";isExpired=true;}
    else if(dayDiff===0){remainingDaysText="<span class='warning'>最後1天</span>";isExpired=false;}
    else if(dayDiff<=30){remainingDaysText=`<span class='warning'>${dayDiff} 天</span>`;isExpired=false;}
    else{remainingDaysText=`${dayDiff} 天`;isExpired=false;}
    return{displayDate,remainingDays:remainingDaysText,isExpired};
  }catch(e){
    return{displayDate:"計算錯誤",remainingDays:"計算錯誤",isExpired:true};
  }
};

// 顯示錯誤
const showError=(msg)=>{
  els.loginWrapper.style.display='none';
  els.captureArea.style.display='none';
  els.inputArea.style.display='none';
  els.buttonGroup.style.display='none';
  els.errorContent.innerHTML=`<p class="font-medium">${msg}</p>`;
  els.errorMessage.style.display='block';
};

const precheckUserFromBackend=(profile)=>{
  return new Promise((resolve,reject)=>{
    const callbackName=`precheckCallback_${Date.now()}`;
    window[callbackName]=function(resp){
      delete window[callbackName];
      if(resp.status==="success"||resp.status==="exceeded"){
        const expiryData=calculateRemainingDaysByDate(resp.expiryDate||PERMANENT_EXPIRY_DATE);
        resolve({
          ...resp,displayName:profile.displayName,remainingDays:expiryData.remainingDays,
          displayExpiryDate:expiryData.displayDate,isExpired:expiryData.isExpired,
          isVip:resp.isVip===true,isSuperAdmin:resp.isSuperAdmin===true,
        });
      }else{
        showError(resp.message||"用戶驗證失敗");
        resolve(null);
      }
    };
    const data={action:'verifyUser',userId:profile.userId,displayName:profile.displayName,callback:callbackName,dataType:'userPrecheck'};
    $.ajax({
      url:API_URL,dataType:'jsonp',jsonp:'callback',jsonpCallback:callbackName,
      timeout:JSONP_TIMEOUT,data:data,
      error:function(xhr,status,error){
        delete window[callbackName];
        const errorMsg=status==='timeout'?'驗證超時，請檢查網絡後重新嘗試':`驗證失敗：${error||'未知網絡錯誤'}`;
        showError(errorMsg);
        reject(new Error(errorMsg));
      }
    });
  });
};

const loginToBackend=()=>{
  return new Promise((resolve)=>{
    const callbackName=`loginCallback_${Date.now()}`;
    window[callbackName]=function(resp){
      delete window[callbackName];
      resolve(resp);
    };
    const data={action:'login',userId:userInfo.userId,displayName:userInfo.displayName,callback:callbackName,dataType:'userLogin'};
    $.ajax({
      url:API_URL,dataType:'jsonp',jsonp:'callback',jsonpCallback:callbackName,
      timeout:JSONP_TIMEOUT,cache:false,data:data,
      error:function(xhr,status,error){
        delete window[callbackName];
        const errorMsg=status==='timeout'?'登入超時，請檢查網絡後重試':`登入失敗：${error||'未知網絡錯誤'}`;
        showToast(errorMsg,'error');
        resolve(null);
      }
    });
  });
};

function renderLoginScreen(info){
  const isPrivilege=info.isVip||info.isSuperAdmin;

  const avatarUrl=(userInfo&&userInfo.pictureUrl)?userInfo.pictureUrl:'';
  const avatarHtml=avatarUrl
    ? `<img class="login-avatar" src="${avatarUrl}" alt="用戶頭像"/>`
    : `<div class="login-avatar login-avatar-fallback">🙂</div>`;

  let badgeHtml='';
  if(info.isSuperAdmin){
    badgeHtml=`
      <div class="login-badge super">👑 超級管理員</div>
      <div class="login-name super-admin-username">${info.displayName}</div>
      <div class="login-sub">不限使用次數</div>
    `;
  }else if(info.isVip){
    badgeHtml=`
      <div class="login-badge vip">💎 尊爵用戶</div>
      <div class="login-name vip-admin-username">${info.displayName}</div>
      <div class="login-sub">有效期限：${info.remainingDays==="永久有效"?"永久有效":`${info.displayExpiryDate}（剩餘 ${info.remainingDays}）`}</div>
    `;
  }else{
    const remain=info.remainingTimes??0;
    badgeHtml=`
      <div class="login-badge gold">🥇 黃金用戶</div>
      <div class="login-name gold-username">${info.displayName}</div>
      <div class="login-sub">剩餘可用次數：<span class="${remain<=0?'expired':'normal'}">${remain} 次</span></div>
    `;
  }

  const rulesHtml=`
    <div class="login-rules">
      <div class="login-rules-title">📜 登入前請詳閱</div>
      <ul>
        <li>🔐 登入扣 <b>1 次</b>使用次數</li>
        <li>🗑️ 每批可免費刪除 <b>3 次</b>，用完扣 <b>1 次</b>使用次數回復 <b>3 次</b>刪除機會</li>
        <li>🔄 重置報表 = 登出，需重新登入</li>
      </ul>
    </div>
  `;

const canLogin=isPrivilege||(info.remainingTimes>0);
  els.loginScreenBody.innerHTML=`
    <div class="login-avatar-wrap">${avatarHtml}</div>
    ${badgeHtml}
    ${rulesHtml}
    ${canLogin
      ? `<button id="loginBtn" class="btn btn-primary btn-lg login-btn-full">🔓<br>登入試算系統</button>`
      : `<div class="login-exceeded">黃金用戶使用次數已達上限（${info.maxUsage||MAX_NORMAL_USER_USAGE}次）<br>請升級 💎尊爵用戶 繼續使用</div>
         <a class="support-btn" style="display:block;text-align:center;margin-top:12px;padding:14px 20px;font-size:16px;border-radius:12px;" href="https://portaly.cc/yb131419/" target="_blank">點擊贊助</a>`}
  `;
  els.loginWrapper.style.display='flex';
  const loginBtn=document.getElementById('loginBtn');
  if(loginBtn)loginBtn.addEventListener('click',handleLoginClick);
}

async function handleLoginClick(){
  const loginBtn=document.getElementById('loginBtn');
  if(loginBtn){loginBtn.disabled=true;loginBtn.innerHTML='<span class="btn-spinner"></span>登入中...';}
  try{
    const loginResult=await loginToBackend();
    if(!loginResult)return;
    if(loginResult.status==='exceeded'){
      showError(loginResult.message||`黃金用戶使用次數已達上限（${loginResult.maxUsage||MAX_NORMAL_USER_USAGE}次）`);
      return;
    }
    if(loginResult.status!=='success'){
      showToast(loginResult.message||'登入失敗，請稍後再試','error');
      return;
    }
    const expiryData=calculateRemainingDaysByDate(loginResult.expiryDate||PERMANENT_EXPIRY_DATE);
    authStatus={
      ...loginResult,
      remainingDays:expiryData.remainingDays,displayExpiryDate:expiryData.displayDate,
      isExpired:expiryData.isExpired,isVip:loginResult.isVip===true,isSuperAdmin:loginResult.isSuperAdmin===true
    };
    if(authStatus.isExpired){
      showError(`
        <div style="line-height:2;">您的帳號已過期，無法登錄試算系統</div>
        <div style="color:#aaa;font-size:0.85rem;margin-bottom:16px;">請聯繫 管理員 續期</div>
        <a class="support-btn" href="https://portaly.cc/yb131419/" target="_blank"
          style="display:block;text-align:center;padding:14px 20px;font-size:16px;border-radius:12px;">
          🌟 點擊贊助
        </a>
        <br><br>
        <div class="example-title">📌 實際使用範例</div>
        <img src="https://yb131419.github.io/Shisuan/goods05_5.png" alt="彥彬試算系統使用範例" loading="lazy"
          style="max-width:100%;width:100%;height:auto;display:block;border-radius:8px;"/>
        <div class="example-caption">建立完成的試算報表實際畫面<br>（僅供參考，實際內容以您輸入的品項為準）</div>
      `);
      return;
    }
    sessionStorage.setItem(SESSION_KEY_ACTIVE,'true');
    sessionStorage.setItem(SESSION_KEY_AUTH,JSON.stringify(authStatus));
    setSessionDeleteCount(0);
    if(loginBtn){loginBtn.innerHTML='✅ 登入成功';loginBtn.classList.add('btn-success');}
    await new Promise(r=>setTimeout(r,320));
    enterCalculator();
    if(authStatus.isSuperAdmin||authStatus.isVip){
      showToast(`歡迎${authStatus.isSuperAdmin?'👑超級管理員':'💎尊爵用戶'}<br><span class="toast-highlight-name">${userInfo.displayName}</span>`);
    }else{
      showToast(`🥇 黃金用戶登入成功，剩餘使用次數：${authStatus.remainingTimes} 次`);
    }
  }finally{
    if(loginBtn){loginBtn.disabled=false;loginBtn.classList.remove('btn-success');loginBtn.innerHTML='🔓<br>登入試算系統';}
  }
}

function enterCalculator(){
  const authContainer=document.getElementById('authContainer');
  authContainer.classList.add('fade-out');
  setTimeout(()=>{
    authContainer.style.display='none';
    authContainer.classList.remove('fade-out');
    els.loginWrapper.style.display='none';
    els.captureArea.style.display='block';
    els.inputArea.style.display='flex';
    els.buttonGroup.style.display='flex';
    els.menuFabWrap.style.display='block';
    els.captureArea.classList.add('screen-enter');
    els.inputArea.classList.add('screen-enter');
    els.buttonGroup.classList.add('screen-enter');
    setTimeout(()=>{
      els.captureArea.classList.remove('screen-enter');
      els.inputArea.classList.remove('screen-enter');
      els.buttonGroup.classList.remove('screen-enter');
    },450);
    setupLineName();
    // 尊爵／超級管理員 登入時帶回上次未完成的報表；
    // 黃金用戶每次登入一律從空白報表開始
    if(authStatus.isVip||authStatus.isSuperAdmin){
      loadSelectedProds();
    }else{
      selectedProds=[];
      localStorage.removeItem('goodsSelectedProducts');
      renderTable();
    }
    checkUserRemainingTimes();
    statusBarHidden=false;
    updateAuthStatusBar();
    // 首次使用自動彈出一次導覽
    if(!localStorage.getItem(GUIDE_SEEN_KEY)){
      localStorage.setItem(GUIDE_SEEN_KEY,'1');
      setTimeout(openGuide,600);
    }
  },320);
}

// 初始化LIFF和授權
async function initLiffAndAuth(){
  try{
    showLoginLoading("正在初始化","請稍候...");
    await liff.init({liffId:LIFF_ID,withLoginOnExternalBrowser:true});
    loadProducts();
    if(!liff.isLoggedIn()){
      showLoginLoading("請先登錄LINE賬號","將自動跳轉至登錄頁面...");
      liff.login({redirectUri:window.location.href});
      return;
    }
    const profile=await liff.getProfile();
    userInfo={userId:profile.userId,displayName:profile.displayName,pictureUrl:profile.pictureUrl||''};

    const cachedSessionActive=sessionStorage.getItem(SESSION_KEY_ACTIVE);
    const cachedAuthRaw=sessionStorage.getItem(SESSION_KEY_AUTH);
    if(cachedSessionActive==='true'&&cachedAuthRaw){
      try{
        authStatus=JSON.parse(cachedAuthRaw);
        if(!authStatus.isExpired){
          enterCalculator();
          return;
        }
      }catch(e){}
    }

    showLoginLoading("彥彬🌿試算系統『購物節』","核對用戶權限中...");
    const precheck=await precheckUserFromBackend(profile);
    if(!precheck)return;
    if(precheck.isExpired){
      showError(`
        <div style="line-height:2;">您的帳號已過期，無法登錄試算系統</div>
        <div style="color:#aaa;font-size:0.85rem;margin-bottom:16px;">請聯繫 管理員 續期</div>
        <a class="support-btn" href="https://portaly.cc/yb131419/" target="_blank"
          style="display:block;text-align:center;padding:14px 20px;font-size:16px;border-radius:12px;">
          🌟 點擊贊助
        </a>
        <br><br>
        <div class="example-title">📌 實際使用範例</div>
        <img src="https://yb131419.github.io/Shisuan/goods05_5.png" alt="彥彬試算系統使用範例" loading="lazy"
          style="max-width:100%;width:100%;height:auto;display:block;border-radius:8px;"/>
        <div class="example-caption">建立完成的試算報表實際畫面<br>（僅供參考，實際內容以您輸入的品項為準）</div>
      `);
      return;
    }
    renderLoginScreen(precheck);
  }catch(error){
    let errorMsg=error.message||'未知初始化錯誤';
    const lower=errorMsg.toLowerCase();
    if(lower.includes('access token expired')){
      errorMsg='登錄狀態已過期，將自動重新登錄';
      showToast(errorMsg, 'warning');
      setTimeout(()=>{
        liff.isLoggedIn()?liff.logout().then(()=>{liff.login({redirectUri:window.location.href});}):liff.login({redirectUri:window.location.href});
      },1500);
    }else if(lower.includes('invalid liff id')||lower.includes('liffid')){
      errorMsg='LIFF ID 無效（'+LIFF_ID+'）<br/>請到 LINE Developers 確認此 LIFF App 存在';
    }else if(lower.includes('forbidden')||lower.includes('client_id')||lower.includes('redirect')){
      errorMsg='LIFF Endpoint URL 與本頁網址不一致<br/>請到 LINE Developers 將 Endpoint URL 設為：<br/>'+location.origin+location.pathname;
    }
    showLoginLoading("初始化失敗",errorMsg+"<br/><br/>目前頁面網址：<br/>"+location.href.split('?')[0]+"<br/>請刷新頁面重新嘗試");
  }
}
